name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  install-dependencies:
    name: 1 · Instalar dependencias
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci
        run: npm ci

      - name: Verificar package-lock.json
        run: test -f package-lock.json

  eslint:
    name: 2 · ESLint
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run lint

  validate-syntax:
    name: 3 · Validar sintaxis JS
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run validate

  unit-tests:
    name: 4 · Tests unitarios
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run test:unit

  integration-tests:
    name: 5 · Tests de integración
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    env:
      NODE_ENV: test
      CPU_LOAD_MS: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run test:integration

  coverage:
    name: 6 · Cobertura
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    env:
      NODE_ENV: test
      CPU_LOAD_MS: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run test:coverage

      - name: Subir cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: 7 · Build de producción
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Subir artefacto dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist/
          retention-days: 14

  npm-audit:
    name: 8 · Auditoría npm
    runs-on: ubuntu-latest
    needs: [install-dependencies]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - name: npm audit (high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true

  ci-todo-ok:
    name: 11 · CI · Todo OK
    runs-on: ubuntu-latest
    needs:
      - eslint
      - validate-syntax
      - unit-tests
      - integration-tests
      - coverage
      - build
      - npm-audit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run ci

      - name: Pipeline completo
        run: echo "✓ backend-utp-api — todos los checks obligatorios pasaron"
